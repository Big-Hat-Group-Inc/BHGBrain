services:
  bhgbrain:
    build: .
    ports:
      - "3721:3721"
    volumes:
      - bhgbrain_data:/data
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
        required: false
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    profiles:
      - self-hosted
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  bhgbrain_data:
  qdrant_data:
